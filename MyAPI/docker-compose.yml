version: '3.8'

services:
  backend:
    build: .
    container_name: magasin_elec_backend
    ports:
      - "8000:8000"
    volumes:
      # Synchronise le code pour le développement en temps réel
      - .:/workdir
      # Assure la persistance des données du catalogue
      - ./catalog:/workdir/catalog
    environment:
      - PYTHONUNBUFFERED=1
      # Vos clés API seront chargées depuis le fichier .env
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: always

